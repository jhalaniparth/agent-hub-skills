---
applications:
  - name: leave-agent
    memory: 512M
    instances: 1
    buildpacks:
      - python_buildpack
    command: python app/main.py --host 0.0.0.0 --port $PORT
    health-check-type: http
    health-check-http-endpoint: /.well-known/agent.json
    services:
      - jouleagent-dest
    env:
      AGENT_PUBLIC_URL: ""
